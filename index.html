<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Digital Invite</title>
    <style>
        body { margin: 0; background: #0e0e0e; color: #d4af37; font-family: 'Playfair Display', serif; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        
        /* Z…ôrf Konteyneri */
        .envelope-wrapper { position: relative; width: 300px; height: 200px; cursor: pointer; transition: 0.5s; perspective: 1000px; }
        
        .envelope { position: relative; width: 100%; height: 100%; background: #1a1a1a; border: 1px solid #d4af37; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 2; transition: 0.8s; }

        /* Z…ôrfin QapaΡüΡ± */
        .envelope::before {
            content: ""; position: absolute; top: 0; left: 0;
            border-left: 150px solid transparent; border-right: 150px solid transparent;
            border-top: 110px solid #d4af37; transform-origin: top; transition: 0.8s; z-index: 3;
        }

        /* AΟßΡ±landa QapaΡüΡ±n DΟΕnm…ôsi */
        .open .envelope::before { transform: rotateX(180deg); }

        /* Daxild…ôki D…ôv…ôtnam…ô */
        .letter {
            position: absolute; bottom: 10px; left: 10px; width: 280px; height: 180px;
            background: #fff; color: #1a1a1a; padding: 20px; box-sizing: border-box;
            text-align: center; z-index: 1; transition: 0.8s;
            border: 2px inset #d4af37;
        }

        .open .letter { transform: translateY(-130px); z-index: 4; height: 260px; }

        h1 { font-size: 22px; margin-bottom: 5px; color: #8b6b4d; text-transform: uppercase; }
        p { font-size: 14px; margin: 5px 0; }
        .tap { margin-top: 20px; font-size: 12px; color: #d4af37; animation: blink 2s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="main-env" onclick="this.classList.toggle('open')">
        <div class="envelope">
            <div class="letter">
                <h1 id="user-names">YΟΦkl…ônir...</h1>
                <p id="user-date">βÄî 00.00.0000 βÄî</p>
                <p>Sizi xo≈ü gΟΦnΟΦmΟΦz…ô d…ôv…ôt edirik!</p>
                <p style="font-size: 10px; margin-top: 20px;">A≈üaΡüΡ± sΟΦrΟΦ≈üdΟΦrΟΦn β§΅οΗè</p>
            </div>
        </div>
        <p class="tap">AΟßmaq ΟΦΟßΟΦn toxunun</p>
    </div>

<script>
    // Linkd…ôki parametrl…ôri oxumaq ΟΦΟßΟΦn funksiya
    const urlParams = new URLSearchParams(window.location.search);
    const beyName = urlParams.get('bey') || "B…ôy";
    const gelinName = urlParams.get('gelin') || "G…ôlin";
    const toyTarixi = urlParams.get('tarix') || "25.01.2026";

    // S…ôhif…ôd…ôki yazΡ±larΡ± yenil…ôyirik
    document.getElementById('user-names').innerText = beyName + " & " + gelinName;
    document.getElementById('user-date').innerText = "βÄî " + toyTarixi + " βÄî";
</script>
    
</body>
</html>
