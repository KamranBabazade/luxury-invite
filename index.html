<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özəl Dəvətnamə</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Cinzel', serif; }

        /* Arxa fon - Videodakı şam effekti üçün tünd qradiyent */
        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(40,30,10,1) 0%, rgba(0,0,0,1) 100%);
            z-index: -1;
        }

        /* Zərf Konteyneri */
        .wrapper { display: flex; justify-content: center; align-items: center; height: 100vh; perspective: 1500px; }

        .envelope {
            position: relative; width: 320px; height: 220px; background: #1a1a1a;
            border: 1px solid #c5a059; box-shadow: 0 30px 60px rgba(0,0,0,1);
            cursor: pointer; transform-style: preserve-3d; transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Zərfin Qapağı (Möhürlü hissə) */
        .envelope::before {
            content: ""; position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 160px solid transparent; border-right: 160px solid transparent;
            border-top: 130px solid #c5a059; transform-origin: top; transition: transform 0.8s; z-index: 5;
        }

        /* Möhür (Wax Seal) */
        .seal {
            position: absolute; top: 110px; left: 50%; transform: translateX(-50%);
            width: 50px; height: 50px; background: #8b0000; border-radius: 50%;
            border: 2px solid #5a0000; z-index: 6; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center; color: #d4af37; font-size: 20px; transition: 0.5s;
        }

        /* Açılanda animasiyalar */
        .open .envelope::before { transform: rotateX(180deg); }
        .open .seal { opacity: 0; transform: translateX(-50%) translateY(-20px); }

        /* Daxildəki Dəvətnamə Vərəqi */
        .card {
            position: absolute; bottom: 10px; left: 10px; width: 300px; height: 200px;
            background: #fff; background-image: linear-gradient(135deg, #fff 0%, #f9f4e8 100%);
            padding: 30px; box-sizing: border-box; text-align: center; z-index: 1;
            transition: all 1s ease; border: 1px solid #d4af37;
        }

        .open .card { transform: translateY(-160px) scale(1.1); height: 320px; z-index: 10; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        /* Yazı Stilləri */
        h1 { font-family: 'Great Vibes', cursive; color: #8b6b4d; font-size: 36px; margin: 10px 0; }
        p { font-size: 14px; letter-spacing: 2px; color: #333; }
        .date { font-weight: bold; color: #c5a059; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }

        .hint { position: absolute; bottom: 50px; color: #c5a059; font-size: 12px; letter-spacing: 3px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="wrapper">
        <div class="envelope" id="env" onclick="openMe()">
            <div class="seal">⚜️</div>
            <div class="card">
                <p>BİZ EVLƏNİRİK</p>
                <h1 id="names">Yüklənir...</h1>
                <div class="date" id="date">00.00.2026</div>
                <p style="font-size: 10px; margin-top: 20px;">SİZİ DƏ GÖZLƏYİRİK</p>
            </div>
        </div>
        <div class="hint" id="hint">AÇMAQ ÜÇÜN TOXUNUN</div>
    </div>

    <script>
        function openMe() {
            document.getElementById('env').classList.add('open');
            document.getElementById('hint').style.display = 'none';
        }

        // Dinamik adlar sistemi
        const params = new URLSearchParams(window.location.search);
        document.getElementById('names').innerText = (params.get('bey') || 'Bəy') + " & " + (params.get('gelin') || 'Gəlin');
        document.getElementById('date').innerText = params.get('tarix') || '25.01.2026';
    </script>
</body>
</html>
