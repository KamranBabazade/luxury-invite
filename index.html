<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özəl Pro Dəvətnamə</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
/* ========== BODY & BACKGROUND ========== */
body, html { margin:0; padding:0; width:100%; height:100%; background:#0b0b0b; overflow:hidden; font-family:'Cinzel', serif; }
.background {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background: radial-gradient(circle at 50% 50%, #302210 0%, #000 100%);
    z-index:-2; 
    overflow:hidden;
}
.particles {
    position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;
}
.particle {
    position:absolute; width:3px; height:3px; background:rgba(255,215,0,0.7);
    border-radius:50%; animation: drift 6s linear infinite;
}
@keyframes drift {
    0% { transform: translateY(0) translateX(0) scale(0.5); opacity:0.8; }
    50% { transform: translateY(-100px) translateX(30px) scale(1); opacity:0.4; }
    100% { transform: translateY(-200px) translateX(-20px) scale(0.3); opacity:0; }
}

/* ========== WRAPPER & PERSPECTIVE ========== */
.wrapper { display:flex; justify-content:center; align-items:center; height:100vh; perspective:1800px; }

/* ========== ENVELOPE ========== */
.envelope {
    position:relative; width:340px; height:240px; background:#1c1c1c; border:2px solid #c5a059;
    box-shadow:0 40px 80px rgba(0,0,0,0.8); cursor:pointer; transform-style:preserve-3d;
    transition: transform 1.2s cubic-bezier(0.68,-0.55,0.265,1.55);
}
.envelope::before {
    content:""; position:absolute; top:0; left:0; width:0; height:0;
    border-left:170px solid transparent; border-right:170px solid transparent;
    border-top:140px solid #c5a059; transform-origin:top; transition: transform 1s ease-in-out; z-index:5;
}

/* ========== SEAL ========== */
.seal {
    position:absolute; top:120px; left:50%; transform:translateX(-50%);
    width:55px; height:55px; border-radius:50%; background: radial-gradient(circle at 30% 30%, #ff4d4d, #8b0000);
    border:2px solid #5a0000; z-index:6; box-shadow:0 6px 15px rgba(0,0,0,0.6);
    display:flex; justify-content:center; align-items:center; color:#ffd700; font-size:22px;
    transition: all 0.6s ease-in-out;
    animation: sealPulse 2s infinite alternate;
}
@keyframes sealPulse { 0%{transform:translateX(-50%) scale(1);} 100%{transform:translateX(-50%) scale(1.08);} }

/* ========== CARD INSIDE ========== */
.card {
    position:absolute; bottom:12px; left:12px; width:316px; height:216px;
    background:#fff; background-image: linear-gradient(145deg, #fff 0%, #fef6e4 100%);
    padding:35px; box-sizing:border-box; text-align:center; z-index:1; border:2px solid #d4af37;
    transition: all 1.2s ease;
    box-shadow:0 8px 20px rgba(0,0,0,0.5);
}
.card h1 { font-family:'Great Vibes', cursive; font-size:38px; color:#8b6b4d; margin:12px 0; opacity:0; transform:translateY(20px); transition: all 1s ease; }
.card p { font-size:14px; letter-spacing:2px; color:#333; opacity:0; transform:translateY(20px); transition: all 1s ease; }
.card .date { font-weight:bold; color:#c5a059; margin-top:18px; border-top:1px solid #eee; padding-top:10px; opacity:0; transform:translateY(20px); transition: all 1s ease; }

/* ========== OPEN STATE ========== */
.open .envelope::before { transform: rotateX(180deg); }
.open .seal { opacity:0; transform:translateX(-50%) translateY(-30px); }
.open .card { transform: translateY(-180px) scale(1.12); box-shadow:0 25px 50px rgba(0,0,0,0.5); z-index:10; }
.open .card h1, .open .card p, .open .card .date {
    opacity:1; transform:translateY(0);
}

/* ========== HINT ========== */
.hint {
    position:absolute; bottom:60px; color:#c5a059; font-size:13px; letter-spacing:3px;
    animation:bounce 2s infinite; z-index:20;
}
@keyframes bounce { 0%,20%,50%,80%,100%{transform:translateY(0);} 40%{transform:translateY(-12px);} 60%{transform:translateY(-6px);} }
</style>
</head>
<body>

<div class="background"></div>
<div class="particles" id="particles"></div>

<div class="wrapper">
    <div class="envelope" id="env" onclick="openEnvelope()">
        <div class="seal">⚜️</div>
        <div class="card">
            <p>BİZ EVLƏNİRİK</p>
            <h1 id="names">Yüklənir...</h1>
            <div class="date" id="date">00.00.2026</div>
            <p style="font-size:11px; margin-top:20px;">SİZİ DƏ GÖZLƏYİRİK</p>
        </div>
    </div>
    <div class="hint" id="hint">AÇMAQ ÜÇÜN TOXUNUN</div>
</div>

<script>
/* ========== ENVELOPE OPEN FUNCTION ========== */
function openEnvelope() {
    document.getElementById('env').classList.add('open');
    document.getElementById('hint').style.display='none';
}

/* ========== URL PARAMETER DYNAMIC NAMES ========== */
const params = new URLSearchParams(window.location.search);
document.getElementById('names').innerText = (params.get('bey')||'Bəy') + " & " + (params.get('gelin')||'Gəlin');
document.getElementById('date').innerText = params.get('tarix')||'25.01.2026';

/* ========== PARTICLE BACKGROUND EFFECT ========== */
const particleContainer = document.getElementById('particles');
for(let i=0;i<80;i++){
    const p = document.createElement('div');
    p.className='particle';
    p.style.top = Math.random()*window.innerHeight+'px';
    p.style.left = Math.random()*window.innerWidth+'px';
    p.style.animationDelay = Math.random()*6+'s';
    p.style.width = p.style.height = Math.random()*3+2+'px';
    particleContainer.appendChild(p);
}

/* ========== OPTIONAL POPUP IF NO URL PARAMS ========== */
if(!params.get('bey') && !params.get('gelin')){
    setTimeout(()=>{
        const bey = prompt("Bəyin adı nədir?", "Kamran");
        const gelin = prompt("Gəlinin adı nədir?", "Ayşə");
        const tar = prompt("Tarixi daxil edin (dd.mm.yyyy)", "23.03.2026");
        document.getElementById('names').innerText = bey + " & " + gelin;
        document.getElementById('date').innerText = tar;
    },500);
}
</script>
</body>
</html>
