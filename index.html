<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Digital Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Great+Vibes&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background: var(--dark); color: var(--white); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        /* ARXA FON VİDEO EFFEKTİ */
        .bg-fixed {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b1b1b 0%, #000 100%);
            z-index: -1;
        }

        /* 1. SECTION: GİRİŞ (ZƏRF) */
        .hero { height: 100vh; display: flex; justify-content: center; align-items: center; perspective: 1500px; }
        
        .envelope-wrapper { position: relative; width: 320px; height: 220px; cursor: pointer; transform-style: preserve-3d; transition: 1s; }
        .envelope { width: 100%; height: 100%; background: #111; border: 1px solid var(--gold); position: relative; }
        .flap { 
            position: absolute; top: 0; width: 100%; height: 100%; background: #1a1a1a;
            clip-path: polygon(0 0, 100% 0, 50% 50%); z-index: 5; transform-origin: top; transition: 0.8s;
        }
        .wax-seal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -20%);
            width: 60px; height: 60px; background: #800; border-radius: 50%; z-index: 6;
            display: flex; justify-content: center; align-items: center; color: var(--gold); font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 2px solid var(--gold);
        }

        .open .flap { transform: rotateX(180deg); }
        .open .wax-seal { opacity: 0; }

        .invitation-card {
            position: absolute; width: 90%; height: 90%; background: #fff; left: 5%; top: 5%;
            padding: 20px; text-align: center; color: #333; transition: 1s; z-index: 1;
        }
        .open .invitation-card { transform: translateY(-150px); height: 300px; z-index: 10; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }

        .card-inner h2 { font-family: 'Great Vibes', cursive; font-size: 30px; color: #8b6b4d; }

        /* 2. SECTION: MƏLUMATLAR (SCROLL) */
        .content-section { padding: 80px 20px; text-align: center; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); }
        
        .timer-container { margin: 40px 0; display: flex; justify-content: center; gap: 20px; }
        .time-unit { border: 1px solid var(--gold); padding: 15px; width: 70px; }
        .time-unit span { display: block; font-size: 24px; font-weight: bold; color: var(--gold); }

        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 40px 0; }
        .gallery img { width: 100%; height: 200px; object-fit: cover; border: 1px solid var(--gold); filter: grayscale(50%); transition: 0.5s; }
        .gallery img:hover { filter: grayscale(0%); }

        .map-container { width: 100%; height: 300px; border: 1px solid var(--gold); margin-top: 30px; }
        
        .footer { padding: 40px; font-family: 'Cinzel Decorative'; color: var(--gold); letter-spacing: 3px; }

        /* HINT */
        .scroll-hint { position: absolute; bottom: 30px; animation: bounce 2s infinite; color: var(--gold); font-size: 10px; letter-spacing: 2px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div class="bg-fixed"></div>

    <section class="hero" id="hero">
        <div class="envelope-wrapper" id="env" onclick="openAll()">
            <div class="envelope">
                <div class="flap"></div>
                <div class="wax-seal">⚜️</div>
                <div class="invitation-card">
                    <div class="card-inner">
                        <p style="font-size: 10px; letter-spacing: 2px;">TOY DƏVƏTNAMƏSİ</p>
                        <h2 id="u-names">Kamran & Leyla</h2>
                        <p id="u-date" style="margin-top: 10px; font-weight: bold;">25.01.2026</p>
                        <p style="font-size: 9px; margin-top: 40px; color: #888;">Aşağı sürüşdürün</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="scroll-hint" id="hint-text">AÇMAQ ÜÇÜN TOXUNUN</div>
    </section>

    <section class="content-section" id="details" style="display: none;">
        <h3 style="font-family: 'Cinzel Decorative'; color: var(--gold);">Toya Qalan Zaman</h3>
        <div class="timer-container" id="countdown">
            <div class="time-unit"><span id="days">00</span>Gün</div>
            <div class="time-unit"><span id="hours">00</span>Saat</div>
            <div class="time-unit"><span id="mins">00</span>Dəq</div>
        </div>

        <div class="gallery">
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=500&q=80" alt="Wedding 1">
            <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=500&q=80" alt="Wedding 2">
        </div>

        <h3 style="font-family: 'Cinzel Decorative'; color: var(--gold); margin-top: 40px;">MƏKAN</h3>
        <p id="u-location" style="margin: 15px 0;">"Sərin" Şadlıq Sarayı, Sumqayıt ş.</p>
        
        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3039.4284901020034!2d49.8241!3d40.4093!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDDCsDI0JzMzLjUiTiA0OcKwNDknMjYuOCJF!5e0!3m2!1sen!2saz!4v1614123456789!5m2!1sen!2saz" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>

        <div class="footer">
            SƏNİ GÖZLƏYİRİK
        </div>
    </section>

    <audio id="myAudio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        function openAll() {
            document.getElementById('env').classList.add('open');
            document.getElementById('details').style.display = 'block';
            document.getElementById('hint-text').innerText = "AŞAĞI SÜRÜŞDÜRÜN ⬇️";
            document.getElementById('myAudio').play();
            // Avtomatik aşağı sürüşdürmə effekti
            setTimeout(() => {
                window.scrollTo(0, 400);
            }, 1500);
        }

        // Dinamik Link Sistemi
        const p = new URLSearchParams(window.location.search);
        document.getElementById('u-names').innerText = (p.get('bey') || 'Kamran') + " & " + (p.get('gelin') || 'Leyla');
        document.getElementById('u-date').innerText = p.get('tarix') || '25.01.2026';
        if(p.get('mekan')) document.getElementById('u-location').innerText = p.get('mekan');

        // Geri Sayım Taymeri
        const targetDate = new Date("Jan 25, 2026 18:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        }, 1000);
    </script>
</body>
</html>
