<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamran & Leyla Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Great+Vibes&family=Montserrat:wght@100;300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-grad: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa8238);
            --dark: #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; width: 100%; }

        /* Background */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: #000; }

        /* Hero & Envelope */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; perspective: 1500px; padding: 20px; }
        
        .envelope-wrapper {
            position: relative; width: 90vw; max-width: 350px; height: 220px;
            transform-style: preserve-3d; transition: transform 0.8s ease; cursor: pointer;
        }
        .envelope-wrapper.is-open { transform: translateY(150px) rotateX(-5deg) !important; }

        .envelope-base { 
            width: 100%; height: 100%; background: #0c0c0c; border: 1px solid rgba(212, 175, 55, 0.4); 
            position: relative; box-shadow: 0 30px 60px rgba(0,0,0,1);
        }

        .flap {
            position: absolute; top: 0; width: 100%; height: 100%; background: #1a1a1a;
            clip-path: polygon(0 0, 100% 0, 50% 55%); z-index: 5;
            transform-origin: top; transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 2px solid var(--gold);
        }
        .is-open .flap { transform: rotateX(180deg); z-index: 1; }

        .wax-seal {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 70px; background: radial-gradient(circle, #b00, #400);
            border-radius: 50%; z-index: 6; display: flex; justify-content: center; align-items: center;
            border: 2px solid var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.5); transition: 0.5s; font-size: 30px;
        }
        .is-open .wax-seal { opacity: 0; transform: translate(-50%, -150%) scale(0); }

        /* The Card inside */
        .card {
            position: absolute; width: 94%; height: 94%; left: 3%; top: 3%;
            background: #fff; background-image: linear-gradient(135deg, #fff 0%, #f4e8d1 100%);
            padding: 20px; text-align: center; color: #1a1a1a; z-index: 2;
            transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); border: 1px solid var(--gold);
        }
        .is-open .card { transform: translateY(-380px) scale(1.05); height: 520px; z-index: 10; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }

        .card h2 { font-family: 'Great Vibes', cursive; font-size: 42px; background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 15px 0; }
        .card p { font-size: 12px; letter-spacing: 3px; color: #555; }

        /* Details Section */
        .details-section { padding: 50px 10px; text-align: center; opacity: 0; transition: 2s; width: 100%; display:none; }
        .reveal { opacity: 1; display: block; }

        /* Mobile Friendly Timer */
        .timer { display: flex; justify-content: center; gap: 8px; margin: 30px 0; flex-wrap: wrap; }
        .timer-box { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--gold); 
            padding: 15px; min-width: 75px; border-radius: 12px; backdrop-filter: blur(10px);
        }
        .timer-box span { display: block; font-size: 28px; color: var(--gold); font-weight: 900; }
        .timer-box small { font-size: 10px; color: #ccc; text-transform: uppercase; }

        /* Map and Button */
        .map-frame { width: 95%; height: 300px; margin: 20px auto; border-radius: 20px; border: 1px solid var(--gold); overflow: hidden; filter: grayscale(1) invert(0.9); }
        .btn-rsvp {
            display: inline-block; padding: 12px 30px; margin-top: 20px;
            background: var(--gold-grad); color: #000; font-weight: 700;
            text-decoration: none; border-radius: 25px; box-shadow: 0 10px 20px rgba(212,175,55,0.3);
        }

        .hint { position: absolute; bottom: 30px; color: var(--gold); font-size: 10px; letter-spacing: 5px; animation: bounce 2s infinite; text-align: center; width: 100%; }
        @keyframes bounce { 0%,100%{transform:translateY(0);opacity:0.3;} 50%{transform:translateY(-10px);opacity:1;} }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<section class="hero" id="hero-section">
    <div class="envelope-wrapper" id="env" onclick="openElite()">
        <div class="envelope-base">
            <div class="flap"></div>
            <div class="wax-seal">💍</div>
            <div class="card">
                <p>TOY DƏVƏTNAMƏSİ</p>
                <h2>Kamran & Leyla</h2>
                <div style="border-top: 1px solid #d4af37; border-bottom: 1px solid #d4af37; padding: 15px 0; margin: 20px 0;">
                    <span style="font-family: 'Cinzel Decorative'; font-size: 20px; font-weight: 700;">25 . 03 . 2026</span>
                </div>
                <p style="color: #d4af37; font-weight: 600;">GÖZLƏYİRİK</p>
            </div>
        </div>
    </div>
    <div class="hint" id="hint-text">AÇMAQ ÜÇÜN TOXUNUN</div>
</section>

<div class="details-section" id="details">
    <h3 style="font-family: 'Cinzel Decorative'; color: var(--gold); letter-spacing: 5px; font-size: 18px;">TOYA QALAN ZAMAN</h3>
    <div class="timer">
        <div class="timer-box"><span id="days">00</span><small>GÜN</small></div>
        <div class="timer-box"><span id="hours">00</span><small>SAAT</small></div>
        <div class="timer-box"><span id="mins">00</span><small>DƏQ</small></div>
        <div class="timer-box"><span id="secs">00</span><small>SAN</small></div>
    </div>

    <div style="padding: 40px 10px;">
        <h3 style="font-family: 'Cinzel Decorative'; color: var(--gold); font-size: 18px;">MƏKAN</h3>
        <p style="font-size: 14px; margin: 15px 0;">Sumqayıt, "Golden Palace" Şadlıq Sarayı</p>
        <div class="map-frame">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3027.6521345!2d49.66!3d40.59!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDDCsDM1JzI0LjAiTiA0OcKwMzknMzYuMCJF!5e0!3m2!1saz!2saz!4v1625123456789" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
        <a href="https://wa.me/994000000000?text=Salam+Kamran,+dəvətnaməni+aldıq,+iştirak+edəcəyik!" class="btn-rsvp">İştirakı Təsdiqlə</a>
    </div>

    <p style="font-family: 'Great Vibes'; font-size: 40px; color: var(--gold); padding: 50px 0;">Xoşbəxtlik paylaşıldıqca artar...</p>
</div>

<audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
// 1. TAYMER (25 Mart 2026)
const target = new Date("Mar 25, 2026 18:00:00").getTime();
function updateTimer() {
    const now = new Date().getTime();
    const d = target - now;
    if (d < 0) return;
    document.getElementById('days').innerText = String(Math.floor(d / 86400000)).padStart(2, '0');
    document.getElementById('hours').innerText = String(Math.floor((d % 86400000) / 3600000)).padStart(2, '0');
    document.getElementById('mins').innerText = String(Math.floor((d % 3600000) / 60000)).padStart(2, '0');
    document.getElementById('secs').innerText = String(Math.floor((d % 60000) / 1000)).padStart(2, '0');
}
setInterval(updateTimer, 1000);
updateTimer();

// 2. BACKGROUND PARTICLES
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let particles = [];
class P {
    constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*2; this.v = Math.random()*0.5; }
    draw() { ctx.fillStyle="rgba(212,175,55,0.5)"; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); }
    move() { this.y -= this.v; if(this.y < 0) this.y = canvas.height; }
}
for(let i=0; i<80; i++) particles.push(new P());
function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.move();p.draw();}); requestAnimationFrame(anim); }
anim();

// 3. OPEN LOGIC
function openElite() {
    const env = document.getElementById('env');
    if(env.classList.contains('is-open')) return;
    env.classList.add('is-open');
    document.getElementById('bg-music').play().catch(() => {});
    
    setTimeout(() => {
        document.getElementById('details').classList.add('reveal');
        document.getElementById('hint-text').innerText = "AŞAĞIYA SÜRÜŞDÜRÜN";
        window.scrollTo({ top: 500, behavior: 'smooth' });
    }, 1500);
}
</script>
</body>
</html>
