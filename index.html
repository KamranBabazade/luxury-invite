<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Digital Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Great+Vibes&family=Montserrat:wght@100;300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-shadow: rgba(212, 175, 55, 0.3);
            --glass: rgba(255, 255, 255, 0.03);
            --dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body { 
            background: var(--dark); 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 🌌 ANIMATED BACKGROUND PARTICLES */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: -2;
        }

        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3; z-index: -1; animation: slide 60s linear infinite;
        }
        @keyframes slide { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        /* ✉️ HERO SECTION (3D ENVELOPE) */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; perspective: 2000px; }
        
        .envelope-container {
            position: relative; width: 340px; height: 240px;
            transform-style: preserve-3d; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        .envelope-container.is-open { transform: translateY(150px) rotateX(-10deg); }

        .envelope-base { 
            width: 100%; height: 100%; background: #111; 
            border: 1px solid rgba(212, 175, 55, 0.2); position: relative; 
        }

        .flap {
            position: absolute; top: 0; width: 100%; height: 100%; background: #1a1a1a;
            clip-path: polygon(0 0, 100% 0, 50% 55%); z-index: 5;
            transform-origin: top; transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 2px solid var(--gold);
        }

        .is-open .flap { transform: rotateX(180deg); z-index: 1; }

        .wax-seal {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 70px; background: radial-gradient(circle, #800, #400);
            border-radius: 50%; z-index: 6; display: flex; justify-content: center; align-items: center;
            border: 2px solid var(--gold); box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: 0.5s; font-size: 30px;
        }

        .is-open .wax-seal { opacity: 0; transform: translate(-50%, -100%) scale(0.5); }

        /* 📜 DƏVƏTNAMƏ VƏRƏQİ */
        .card {
            position: absolute; width: 92%; height: 92%; left: 4%; top: 4%;
            background: linear-gradient(135deg, #fff 0%, #f4e8d1 100%);
            z-index: 2; padding: 30px; text-align: center; color: #222;
            transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .is-open .card { 
            transform: translateY(-340px) scale(1.1); 
            height: 520px; z-index: 10;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
        }

        .card h2 { font-family: 'Great Vibes', cursive; font-size: 45px; color: #443322; margin: 20px 0; }
        .card p { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #888; }
        .card .date-box { border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); padding: 15px 0; margin: 20px 0; font-family: 'Cinzel Decorative'; font-weight: bold; }

        /* 📊 SCROLL CONTENT */
        .main-content { opacity: 0; transition: 2s; padding: 50px 20px; }
        .reveal { opacity: 1; }

        .section-title { font-family: 'Cinzel Decorative'; color: var(--gold); font-size: 22px; margin-bottom: 30px; text-align: center; letter-spacing: 5px; }

        /* ⏳ COUNTDOWN */
        .countdown { display: flex; justify-content: center; gap: 15px; margin-bottom: 60px; }
        .count-item { 
            background: var(--glass); border: 1px solid var(--gold-shadow);
            padding: 20px; min-width: 80px; text-align: center;
            backdrop-filter: blur(5px);
        }
        .count-item span { display: block; font-size: 28px; color: var(--gold); font-weight: 900; }

        /* 🖼️ PARALLAX GALLERY */
        .parallax-gallery { display: flex; flex-direction: column; gap: 20px; margin-bottom: 60px; }
        .photo-frame { 
            width: 100%; height: 400px; overflow: hidden; position: relative;
            border: 1px solid var(--gold-shadow);
        }
        .photo-frame img { width: 100%; height: 120%; object-fit: cover; position: absolute; top: -10%; transition: 0.1s; }

        /* 📍 LOCATION MAP */
        .map-box { 
            width: 100%; height: 350px; border: 1px solid var(--gold);
            filter: grayscale(1) invert(0.9) contrast(1.2); /* Luxury Black Map look */
        }

        /* 🖱️ HINT ANIMATION */
        .scroll-down { margin-top: 50px; color: var(--gold); font-size: 10px; letter-spacing: 4px; animation: updown 2s infinite; }
        @keyframes updown { 0%, 100% { transform: translateY(0); opacity: 0.3; } 50% { transform: translateY(-10px); opacity: 1; } }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="particles"></div>

    <section class="hero">
        <div class="envelope-container" id="env" onclick="startExperience()">
            <div class="envelope-base">
                <div class="flap"></div>
                <div class="wax-seal">⚜️</div>
                <div class="card">
                    <p>Özəl Gündə Sizinlə</p>
                    <h2 id="u-names">Yüklənir...</h2>
                    <div class="date-box" id="u-date">00 . 00 . 2026</div>
                    <p style="color:var(--gold)">Açmaq üçün toxun</p>
                </div>
            </div>
        </div>
        <div class="scroll-down" id="hint">DƏVƏTNAMƏNİ AÇIN</div>
    </section>

    <div class="main-content" id="main">
        <h2 class="section-title">XOŞBƏXTLİYƏ DOĞRU</h2>
        
        <div class="countdown">
            <div class="count-item"><span id="days">00</span>GÜN</div>
            <div class="count-item"><span id="hours">00</span>SAAT</div>
            <div class="count-item"><span id="mins">00</span>DƏQ</div>
        </div>

        <div class="parallax-gallery">
            <div class="photo-frame">
                <img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1000" class="parallax-img">
            </div>
            <div class="photo-frame" style="height: 300px;">
                <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?q=80&w=1000" class="parallax-img">
            </div>
        </div>

        <h2 class="section-title">MƏKAN</h2>
        <p style="text-align: center; margin-bottom: 20px; font-weight: 200; letter-spacing: 2px;" id="u-location">GOLDEN PALACE</p>
        <div class="map-box">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12141.626456073822!2d49.829445!3d40.409262!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDDCsDI0JzMzLjMiTiA0OcKwNDknNDYuMCJF!5e0!3m2!1sen!2saz!4v1634567890123" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>

        <div style="padding: 100px 0; text-align: center;">
            <p style="font-family: 'Great Vibes'; font-size: 35px; color: var(--gold);">Sizi gözləyirik...</p>
        </div>
    </div>

    <audio id="music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startExperience() {
            document.getElementById('env').classList.add('is-open');
            document.getElementById('main').classList.add('reveal');
            document.getElementById('hint').innerText = "AŞAĞI SÜRÜŞDÜRÜN";
            document.getElementById('music').play();
            
            setTimeout(() => {
                window.scrollTo({ top: 500, behavior: 'smooth' });
            }, 2000);
        }

        // 🏎️ PARALLAX EFFECT
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const images = document.querySelectorAll('.parallax-img');
            images.forEach(img => {
                let speed = 0.4;
                img.style.transform = `translateY(${scrolled * speed}px)`;
            });
        });

        // 🔗 DYNAMIC CONTENT
        const params = new URLSearchParams(window.location.search);
        document.getElementById('u-names').innerText = (params.get('bey') || 'Kamran') + " & " + (params.get('gelin') || 'Leyla');
        document.getElementById('u-date').innerText = (params.get('tarix') || '25.01.2026').split('.').join(' . ');
        if(params.get('mekan')) document.getElementById('u-location').innerText = params.get('mekan');

        // ⏰ COUNTDOWN
        const target = new Date("Jan 25, 2026 18:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const d = target - now;
            document.getElementById('days').innerText = Math.floor(d / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('mins').innerText = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
        }, 1000);
    </script>
</body>
</html>
