<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Luxury Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Great+Vibes&family=Montserrat:wght@100;300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-grad: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa8238);
            --dark: #050505;
            --glow: 0 0 30px rgba(212, 175, 55, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; cursor: crosshair; }

        /* ✨ CINEMATIC CANVAS WITH RINGS */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }

        /* 🎭 3D SCENE */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; perspective: 3000px; }
        
        .envelope-wrapper {
            position: relative; width: 360px; height: 240px;
            transform-style: preserve-3d; transition: transform 0.7s ease-out;
            cursor: pointer;
        }
        .envelope-wrapper.is-open { transform: translateY(200px) rotateX(-10deg) !important; }

        .envelope-base { 
            width: 100%; height: 100%; background: #0c0c0c; 
            border: 1px solid rgba(212, 175, 55, 0.5); position: relative;
            box-shadow: 0 60px 130px rgba(0,0,0,1);
        }

        .flap {
            position: absolute; top: 0; width: 100%; height: 100%; background: #121212;
            clip-path: polygon(0 0, 100% 0, 50% 55%); z-index: 5;
            transform-origin: top; transition: 1.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 2.5px solid var(--gold);
        }
        .is-open .flap { transform: rotateX(180deg); z-index: 1; }

        .wax-seal {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            width: 90px; height: 90px; background: radial-gradient(circle, #c00, #400);
            border-radius: 50%; z-index: 6; display: flex; justify-content: center; align-items: center;
            border: 3px solid var(--gold); box-shadow: var(--glow);
            transition: 0.7s; font-size: 40px; color: var(--gold);
        }
        .is-open .wax-seal { opacity: 0; transform: translate(-50%, -200%) scale(0); }

        /* 📜 THE PREMIUM CARD */
        .card {
            position: absolute; width: 94%; height: 94%; left: 3%; top: 3%;
            background: #fff; background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'), 
                              linear-gradient(135deg, #ffffff 0%, #f4e8d1 100%);
            padding: 30px; text-align: center; color: #1a1a1a; z-index: 2;
            transition: 1.8s cubic-bezier(0.19, 1, 0.22, 1);
            border: 1px solid var(--gold);
        }
        .is-open .card { 
            transform: translateY(-440px) scale(1.15); height: 590px; 
            z-index: 10; box-shadow: 0 80px 220px rgba(0,0,0,1);
        }

        .card h2 { 
            font-family: 'Great Vibes', cursive; font-size: 56px; 
            background: var(--gold-grad); -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; margin: 25px 0;
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.1));
        }

        /* ⏳ PERFECT BACKWARDS TIMER */
        .details-section { padding: 100px 20px; text-align: center; opacity: 0; transition: 3s; }
        .reveal { opacity: 1; }

        .timer { display: flex; justify-content: center; gap: 15px; margin: 50px 0; }
        .timer-box { 
            background: rgba(255,255,255,0.02); border: 1.5px solid var(--gold); 
            padding: 22px; min-width: 90px; border-radius: 20px;
            backdrop-filter: blur(30px); box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.1);
        }
        .timer-box span { display: block; font-size: 38px; color: var(--gold); font-weight: 900; text-shadow: var(--glow); }

        /* 📸 PRO GALLERY */
        .gallery-wrap { position: relative; height: 950px; display: flex; justify-content: center; align-items: center; }
        .photo {
            position: absolute; width: 300px; height: 420px; border: 15px solid #fff;
            box-shadow: 0 50px 100px rgba(0,0,0,1); transition: 2.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .photo img { width: 100%; height: 100%; object-fit: cover; }

        .reveal .photo:nth-child(1) { transform: rotate(-15deg) translate(-130px, -80px); }
        .reveal .photo:nth-child(2) { transform: rotate(5deg) translate(0, 0); z-index: 3; width: 330px; height: 460px; }
        .reveal .photo:nth-child(3) { transform: rotate(20deg) translate(130px, 80px); }

        /* 📍 INTERACTIVE SPARKLE DUST */
        .dust { position: fixed; pointer-events: none; background: var(--gold); border-radius: 50%; opacity: 0.8; z-index: 1000; animation: fadeDust 1.5s forwards; }
        @keyframes fadeDust { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }

        .hint { position: absolute; bottom: 50px; color: var(--gold); font-size: 11px; letter-spacing: 10px; animation: bounce 2s infinite; font-weight: 600; text-shadow: var(--glow); }
        @keyframes bounce { 0%,100%{transform:translateY(0); opacity: 0.4;} 50%{transform:translateY(-25px); opacity: 1;} }

    </style>
</head>
<body onmousemove="drawDust(event)" ontouchmove="drawDust(event)">

<canvas id="bg-canvas"></canvas>

<section class="hero">
    <div class="envelope-wrapper" id="env" onclick="openElite()">
        <div class="envelope-base">
            <div class="flap"></div>
            <div class="wax-seal">💍</div>
            <div class="card">
                <p style="letter-spacing: 8px; font-weight: 300; font-size: 11px; color: #666;">WEDDING CELEBRATION</p>
                <h2 id="u-names">Kamran & Leyla</h2>
                <div style="border-top: 1.5px solid var(--gold); border-bottom: 1.5px solid var(--gold); padding: 22px 0; margin: 30px 0;">
                    <span id="u-date" style="font-family: 'Cinzel Decorative'; font-size: 26px; font-weight: 900; letter-spacing: 4px;">25 . 03 . 2026</span>
                </div>
                <p style="color: var(--gold); font-weight: 600; letter-spacing: 5px; font-size: 14px; text-transform: uppercase;">Xoş Gəlmisiniz</p>
            </div>
        </div>
    </div>
    <div class="hint" id="hint-text">DƏVƏTNAMƏNİ AÇIN</div>
</section>

<div class="details-section" id="details">
    <h3 style="font-family: 'Cinzel Decorative'; letter-spacing: 15px; color: var(--gold); text-shadow: var(--glow);">GERİ SAYIM</h3>
    <div class="timer">
        <div class="timer-box"><span id="days">00</span>GÜN</div>
        <div class="timer-box"><span id="hours">00</span>SAAT</div>
        <div class="timer-box"><span id="mins">00</span>DƏQ</div>
        <div class="timer-box"><span id="secs">00</span>SAN</div>
    </div>

    <div class="gallery-wrap">
        <div class="photo"><img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?q=80&w=800"></div>
        <div class="photo"><img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?q=80&w=800"></div>
        <div class="photo"><img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=800"></div>
    </div>

    <div style="padding: 150px 0;">
        <p style="font-family: 'Great Vibes'; font-size: 60px; color: var(--gold); text-shadow: var(--glow);">Sizi gözləyirik...</p>
    </div>
</div>

<audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
// 1. TAYMER SİSTEMİ (25 Mart 2026 Üçün Tam Dəqiq)
const targetDate = new Date("Mar 25, 2026 18:00:00").getTime();

function updateTimer() {
    const now = new Date().getTime();
    const distance = targetDate - now;

    const d = Math.floor(distance / (1000 * 60 * 60 * 24));
    const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById('days').innerText = String(d < 0 ? 0 : d).padStart(2, '0');
    document.getElementById('hours').innerText = String(h < 0 ? 0 : h).padStart(2, '0');
    document.getElementById('mins').innerText = String(m < 0 ? 0 : m).padStart(2, '0');
    document.getElementById('secs').innerText = String(s < 0 ? 0 : s).padStart(2, '0');
}
setInterval(updateTimer, 1000);
updateTimer();

// 2. GOLDEN PARTICLE ENGINE (Üzüklər və Toz)
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let particles = [];

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3;
        this.speedY = Math.random() * 0.4 + 0.1;
        this.opacity = Math.random() * 0.6;
        this.isRing = Math.random() > 0.95;
    }
    update() {
        this.y -= this.speedY;
        if (this.y < -20) this.y = canvas.height + 20;
    }
    draw() {
        ctx.strokeStyle = ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`;
        ctx.beginPath();
        if (this.isRing) {
            ctx.arc(this.x, this.y, 15, 0, Math.PI * 2);
            ctx.lineWidth = 0.5;
            ctx.stroke();
        } else {
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}
for (let i = 0; i < 120; i++) particles.push(new Particle());
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}
animate();

// 3. INTERACTIVE DUST EFFECT
function drawDust(e) {
    const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
    const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
    const d = document.createElement('div');
    d.className = 'dust';
    d.style.left = x + 'px'; d.style.top = y + 'px';
    const size = Math.random() * 6 + 2;
    d.style.width = d.style.height = size + 'px';
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 1000);
}

// 4. PARALLAX CONTROL
function handleParallax(e) {
    if(document.getElementById('env').classList.contains('is-open')) return;
    const x = ((e.clientX || e.touches[0].clientX) / window.innerWidth) - 0.5;
    const y = ((e.clientY || e.touches[0].clientY) / window.innerHeight) - 0.5;
    document.getElementById('env').style.transform = `rotateY(${x * 50}deg) rotateX(${-y * 50}deg)`;
}

// 5. OPEN EXPERIENCE
function openElite() {
    const env = document.getElementById('env');
    if(env.classList.contains('is-open')) return;
    env.classList.add('is-open');
    document.getElementById('bg-music').play();
    document.getElementById('details').classList.add('reveal');
    document.getElementById('hint-text').innerText = "AŞAĞIYA SÜRÜŞDÜRÜN ⬇️";
    setTimeout(() => { window.scrollTo({ top: 750, behavior: 'smooth' }); }, 2800);
}

// 6. DYNAMIC TEXT FROM URL
const p = new URLSearchParams(window.location.search);
document.getElementById('u-names').innerText = (p.get('bey') || 'Kamran') + " & " + (p.get('gelin') || 'Leyla');
</script>
</body>
</html>
